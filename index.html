<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음의 숲</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0; background-color: #0f172a; color: white;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }

        /* 🗺️ 네비게이션 바: 밤하늘 분위기에 맞춰 어둡게 */
        .nav-bar { background-color: rgba(15, 23, 42, 0.9); padding: 15px 20px; text-align: right; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .nav-bar a { color: #cbd5e1; text-decoration: none; margin-left: 20px; font-weight: bold; }
        .nav-bar a.active { color: #818cf8; }

        /* 🌌 은하수 밤하늘 메인 비주얼 구역 (Hero Section) */
        .hero-section {
            /* 은하수 느낌을 주는 배경: 그라데이션 + 이미지(대체 가능) */
            background: 
                linear-gradient(rgba(0, 0, 0, 0.3), rgba(15, 23, 42, 0.9)), /* 어두운 오버레이 */
                url('https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyNTA5MDlfMjcz%2FMDAxNzU3NDExMDg3NjQz.snSj5yA0JYIh4EduSQ9pp5OPc_gXDg0p5lJgvYn3eF0g.h9qTX3B3_8OqPiPPrnZF87AzwprKy2SEbW6mapjSgPUg.JPEG%2F6a8a24287a732695378b17020101a1aa.jpg&type=ofullfill340_600_png') no-repeat center center/cover; /* 은하수 배경 이미지 (예시) */
            height: 100vh; /* 화면 꽉 차게 */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 0 20px;
            margin-top: 50px; /* 네비게이션 바 공간 확보 */
        }

        /* 🔍 질문 문구: 부드럽게 나타나는 애니메이션 */
        .hero-section h1 {
            font-size: 3rem; font-weight: 700; margin-bottom: 20px;
            opacity: 0; animation: fadeInDown 1.5s ease-out forwards;
        }

        .hero-section p { font-size: 1.3rem; font-weight: 300; opacity: 0; animation: fadeInUp 1.5s ease-out 0.5s forwards; margin-bottom: 40px; }

        /* ⚡ 상태 점검 버튼: 빛나는 효과 */
        .cta-btn {
            background-color: #4f46e5; color: white; padding: 18px 40px;
            font-size: 1.2rem; font-weight: bold; border-radius: 35px;
            text-decoration: none; box-shadow: 0 0 15px rgba(79, 70, 229, 0.5);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            opacity: 0; animation: fadeInUp 1.5s ease-out 1s forwards;
        }
        .cta-btn:hover { background-color: #6366f1; transform: translateY(-3px); box-shadow: 0 0 25px rgba(99, 102, 241, 0.8); }

        /* 애니메이션 키프레임 정의 */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 600px) { .hero-section h1 { font-size: 2rem; } .hero-section p { font-size: 1rem; } .cta-btn { padding: 15px 30px; font-size: 1rem; } }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="active">홈</a>
        <a href="survey.html">진단실</a>
    </div>

    <div class="hero-section">
        <h1>오늘도 안녕하셨나요?</h1>
        <p>잠시 마음에 귀를 기울여볼까요?</p>
        <a href="survey.html" class="cta-btn"><오늘의 상태 점검해보기></a>
    </div>

</body>
</html>
